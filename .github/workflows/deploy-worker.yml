name: Deploy Worker (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - "maffcontaby-worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: maffcontaby-worker/package-lock.json

      - name: Install
        working-directory: maffcontaby-worker
        run: npm ci

      - name: Deploy
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        working-directory: maffcontaby-worker
        run: npx wrangler deploy

      - name: Deploy skipped
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "Deploy do Worker ignorado: configure CLOUDFLARE_API_TOKEN e CLOUDFLARE_ACCOUNT_ID em Secrets do GitHub."
