services:
  db:
    image: postgres:16
    container_name: maffcontaby_db
    environment:
      POSTGRES_DB: maffcontaby
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - maffcontaby_db_data:/var/lib/postgresql/data

volumes:
  maffcontaby_db_data:

