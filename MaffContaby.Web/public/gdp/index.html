<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Horários — Registro Diário</title>
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar" role="banner">
      <!-- Month summary (populated by JS) -->
      <div class="month-summary" aria-label="Resumo do mês" aria-live="polite">
        <div class="month-summary__stat">
          <span class="month-summary__label">Total</span>
          <span class="month-summary__value" id="resumoTotal">—</span>
        </div>
        <div class="month-summary__sep" aria-hidden="true"></div>
        <div class="month-summary__stat">
          <span class="month-summary__label">Dias</span>
          <span class="month-summary__value" id="resumoDias">—</span>
        </div>
      </div>

      <div class="toolbar" aria-label="Ações">
        <!-- Navigation group -->
        <div class="toolbar-group">
          <button id="btnHoje" class="btn" type="button" title="Ir para o mês atual">Hoje</button>
          <button id="btnTema" class="btn" type="button" title="Alternar entre tema claro e escuro">Tema</button>
        </div>

        <div class="toolbar-sep" aria-hidden="true"></div>

        <!-- Export group -->
        <div class="toolbar-group">
          <button id="btnExportarExcel" class="btn" type="button" title="Exportar o mês atual para Excel (CSV)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="margin-right:5px">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14 2v6h6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 13h8M8 17h5" stroke-linecap="round"/>
            </svg>
            Excel
          </button>
          <button id="btnPdfMes" class="btn" type="button" title="PDF resumido do mês atual (visão geral)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="margin-right:5px">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14 2v6h6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9 15h6M9 11h3" stroke-linecap="round"/>
            </svg>
            PDF Resumo
          </button>
          <button id="btnPdfMesDetalhado" class="btn" type="button" title="PDF detalhado do mês atual (com descrições e observações)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="margin-right:5px">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14 2v6h6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 13h8M8 17h8M8 11h2" stroke-linecap="round"/>
            </svg>
            PDF Detalhado
          </button>
        </div>
      </div>
    </header>

    <main class="container" role="main">
      <section class="monthbar" aria-label="Navegação do mês">
        <div class="monthnav" role="group" aria-label="Controles de navegação do calendário">
          <button id="btnMesAnterior" class="btn icon" type="button" aria-label="Mês anterior">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <h1 id="tituloMes" class="month-title" aria-live="polite">—</h1>
          <button id="btnMesProximo" class="btn icon" type="button" aria-label="Próximo mês">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <!-- resumoMes is used by app.js for backwards compat — hidden, data goes to new elements -->
        <div id="resumoMes" class="sr-only" aria-hidden="true"></div>
      </section>

      <section class="calendar" aria-label="Calendário de atividades">
        <div class="weekdays" role="row" aria-hidden="true">
          <div>Seg</div>
          <div>Ter</div>
          <div>Qua</div>
          <div>Qui</div>
          <div>Sex</div>
          <div>Sáb</div>
          <div>Dom</div>
        </div>
        <div id="gridDias" class="days-grid" role="grid" aria-label="Dias do mês"></div>
      </section>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitulo" aria-hidden="true">
      <div class="modal-backdrop" data-close="true" aria-hidden="true"></div>
      <div class="modal-card">
        <div class="modal-header">
          <div>
            <p id="modalTitulo" class="modal-title">Novo registro</p>
            <p id="modalSubtitulo" class="modal-subtitle muted">—</p>
          </div>
          <button id="btnFecharModal" class="btn icon ghost" type="button" aria-label="Fechar modal">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <form id="formRegistro" class="form" novalidate>
          <input id="registroId" type="hidden" />
          <input id="registroData" type="hidden" />

          <div class="field">
            <label for="atividade">Atividade</label>
            <input
              id="atividade"
              name="atividade"
              type="text"
              required
              autocomplete="off"
              placeholder="Ex.: Reunião de planejamento, Desenvolvimento, Estudo…"
            />
          </div>

          <div class="field">
            <label for="descricao">Descrição <span class="muted" style="font-weight:400">(opcional)</span></label>
            <textarea id="descricao" name="descricao" rows="2" placeholder="Resumo breve do que foi feito."></textarea>
          </div>

          <div class="time-row">
            <div class="field">
              <label for="inicio">Início</label>
              <input id="inicio" name="inicio" type="time" required />
            </div>
            <div class="field">
              <label for="fim">Fim</label>
              <input id="fim" name="fim" type="time" required />
            </div>
            <div class="field">
              <label for="total">Duração</label>
              <input id="total" name="total" type="text" readonly aria-label="Duração calculada automaticamente" />
              <span class="field-hint">Calculado</span>
            </div>
          </div>

          <div class="field">
            <label for="observacao">
              Observação
              <span class="muted" style="font-weight:400">(opcional)</span>
            </label>
            <textarea
              id="observacao"
              name="observacao"
              rows="5"
              maxlength="10000"
              placeholder="Espaço para anotações detalhadas (até 10.000 caracteres)."
            ></textarea>
            <div class="field-hint" style="display:flex;justify-content:flex-end">
              <span><span id="contagemObs">0</span>/10000</span>
            </div>
          </div>

          <div class="modal-actions">
            <button id="btnExcluir" class="btn danger" type="button" hidden aria-label="Excluir registro">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="margin-right:5px">
                <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Excluir
            </button>
            <div class="spacer"></div>
            <button id="btnCancelar" class="btn ghost" type="button">Cancelar</button>
            <button id="btnSalvar" class="btn primary" type="submit">Salvar registro</button>
          </div>

          <p id="erroForm" class="form-error" role="alert" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <!-- Day popover — full activity list for a day -->
    <div id="dayPopover" class="day-popover" role="dialog" aria-modal="true" aria-labelledby="dayPopoverTitle" aria-hidden="true">
      <div class="day-popover-backdrop" data-close-popover="true" aria-hidden="true"></div>
      <div class="day-popover-card">
        <div class="day-popover-header">
          <div>
            <p id="dayPopoverTitle" class="day-popover-title">—</p>
            <p id="dayPopoverSubtitle" class="day-popover-subtitle">—</p>
          </div>
          <div style="display:flex; gap:6px; align-items:center;">
            <button id="btnAddFromPopover" class="btn primary" type="button" title="Adicionar nova atividade neste dia">+ Nova</button>
            <button id="btnFecharPopover" class="btn icon ghost" type="button" aria-label="Fechar lista do dia">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="dayPopoverList" class="day-popover-list" role="list"></div>
        <div class="day-popover-footer">
          <span><span id="dayPopoverCount">0</span> atividade(s)</span>
          <span>Total do dia: <strong id="dayPopoverTotal">00h00</strong></span>
        </div>
      </div>
    </div>

    <!-- Activity template (delete button uses SVG, no emoji) -->
    <template id="tplAtividade">
      <div class="activity">
        <button class="activity-main" type="button" aria-label="Editar atividade">
          <span class="activity-name"></span>
          <span class="activity-time"></span>
        </button>
        <button class="btn activity-del" type="button" title="Excluir atividade" aria-label="Excluir atividade">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
